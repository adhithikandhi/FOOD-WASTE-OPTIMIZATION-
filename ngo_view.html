{% extends 'base.html' %}
{% block content %}

<h2>Food Donations</h2>
<table border="1" width="100%">
<tr>
<th>Donor</th>
<th>Food</th>
<th>Qty</th>
<th>Status</th>
</tr>

{% for d in donations %}
<tr>
<td>{{ d[1] }}</td>
<td>{{ d[3] }}</td>
<td>{{ d[4] }}</td>
<td>{{ d[5] }}</td>
</tr>
{% endfor %}

</table>

{% endblock %}
