{% extends 'base.html' %}
{% block content %}

<div class="container">
<h2>Donor Login</h2>

{% if error %}
<div class="error-dialog">{{ error }}</div>
{% endif %}

<form method="POST">
<input name="email" placeholder="Email">
<input name="password" type="password" placeholder="Password">
<button>Login</button>
</form>

</div>

{% endblock %}
